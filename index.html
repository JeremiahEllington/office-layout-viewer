function exportJSON() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'office-layout.json'; a.click();
  URL.revokeObjectURL(url);
}

function importJSONText(text) {
  try {
    const parsed = JSON.parse(text);
    if (!parsed.floors || !Array.isArray(parsed.floors) || parsed.floors.length === 0) {
      throw new Error('Invalid JSON: missing floors array.');
    }
    parsed.editMode = false;
    parsed.placingType = null;
    if (!Array.isArray(parsed.customLayers)) parsed.customLayers = [];
    S = parsed;
    saveState();
    rebuildCustomOverlays();
    render();
    closeImportModal();
  } catch(e) {
    document.getElementById('im-err').textContent = 'Error: ' + e.message;
  }
}

function importCSVText(text) {
  try {
    const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('type,'));
    const floor = S.floors[S.currentFloor];
    let added = 0;
    for (const line of lines) {
      const parts = line.split(',').map(s => s.trim());
      const [type, name, xs, ys, extra1, extra2] = parts;
      const x = parseFloat(xs) || 0;
      const y = parseFloat(ys) || 0;
      const id = generateId();
      if (type === 'desk') {
        floor.items.desks.push({ id, x, y, name: name||'New Desk', pc: extra1||'WS-000', ext: extra2||'100', hasPC: true, hasPhone: true });
        added++;
      } else if (type === 'printer') {
        floor.items.printers.push({ id, x, y, label: name||'PRN-000', model: extra1||'' });
        added++;
      } else if (type === 'network') {
        floor.items.network.push({ id, x, y, t: extra1||'floor' });
        added++;
      } else if (type === 'camera') {
        floor.items.cameras.push({ id, x, y });
        added++;
      }
    }
    if (added === 0) throw new Error('No valid rows found. Check format: type,name,x,y,extra1,extra2');
    saveState();
    render();
    closeImportModal();
  } catch(e) {
    document.getElementById('im-err').textContent = 'Error: ' + e.message;
  }
}

function downloadCSVTemplate() {
  const content = `type,name,x,y,extra1,extra2
desk,Alice Johnson,22,218,WS-001,101
printer,PRN-005,400,300,HP LaserJet,
network,,150,200,wall,
camera,,660,18,,
`;
  const blob = new Blob([content], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'office-layout-template.csv'; a.click();
  URL.revokeObjectURL(url);
}

function openImportModal(mode) {
  importMode = mode;

  const pastePnl = document.getElementById('im-panel-paste');
  const filePnl  = document.getElementById('im-panel-file');

  err.textContent = '';
  title.textContent = mode === 'json' ? 'Import JSON' : 'Import CSV';

  if (mode === 'json') {
    pastePnl.innerHTML = `
      <p>Paste the full JSON export below:</p>
      <textarea id="im-paste-area" placeholder='{"floors": [...], ...}'></textarea>`;
    filePnl.innerHTML = `
      <p>Select a .json file to load:</p>
      <label class="im-btn-file" style="display:inline-block;cursor:pointer">
        Choose File
        <input type="file" class="im-file-input" id="im-file-input" accept=".json">
      </label>
      <span id="im-file-name" style="font-size:10.5px;color:var(--text-dim);margin-left:8px;"></span>`;
  } else {
    pastePnl.innerHTML = `
      <p>Paste CSV rows below. Format: <code style="color:#b068f0">type,name,x,y,extra1,extra2</code><br>
      Types: desk, printer, network, camera</p>
      <textarea id="im-paste-area" placeholder="desk,Alice Johnson,22,218,WS-001,101&#10;camera,,660,18,,"></textarea>`;
    filePnl.innerHTML = `
      <p>Select a .csv file to import into the current floor:</p>
      <label class="im-btn-file" style="display:inline-block;cursor:pointer">
        Choose File
        <input type="file" class="im-file-input" id="im-file-input" accept=".csv">
      </label>
      <span id="im-file-name" style="font-size:10.5px;color:var(--text-dim);margin-left:8px;"></span>`;
  }

  actions.innerHTML = `
    <button class="im-btn" id="im-do-btn">${mode === 'json' ? 'Load JSON' : 'Import CSV'}</button>
    <button class="im-cancel" id="im-close-btn">Cancel</button>`;

  modal.classList.add('show');

  // Tab switching
  document.querySelectorAll('.im-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.im-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const panelId = 'im-panel-' + tab.dataset.panel;
      document.getElementById('im-panel-paste').classList.toggle('active', tab.dataset.panel === 'paste');
      document.getElementById('im-panel-file').classList.toggle('active', tab.dataset.panel === 'file');
    });
  });

  document.getElementById('im-do-btn').addEventListener('click', () => {
    err.textContent = '';
    const activeTab = document.querySelector('.im-tab.active').dataset.panel;
    if (activeTab === 'paste') {
      const text = document.getElementById('im-paste-area').value.trim();
      if (!text) { err.textContent = 'Please paste some content.'; return; }
      if (mode === 'json') importJSONText(text);
      else importCSVText(text);
    } else {
      const fi = document.getElementById('im-file-input');
      if (!fi || !fi.files[0]) { err.textContent = 'Please select a file.'; return; }
      const reader = new FileReader();
      reader.onload = ev => {
        if (mode === 'json') importJSONText(ev.target.result);
        else importCSVText(ev.target.result);
      };
      reader.readAsText(fi.files[0]);
    }
  });

  document.getElementById('im-close-btn').addEventListener('click', closeImportModal);

  // File name display
  setTimeout(() => {
    const fi = document.getElementById('im-file-input');
    if (fi) {
      fi.addEventListener('change', () => {
        const nameEl = document.getElementById('im-file-name');
        if (nameEl) nameEl.textContent = fi.files[0] ? fi.files[0].name : '';
      });
    }
  }, 50);
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('show');
}

function uploadMap(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const dataURL = ev.target.result;
    const floor = S.floors[S.currentFloor];
    const img = new Image();
    img.onload = () => {
      floor.coordH = Math.round(980 * img.naturalHeight / img.naturalWidth);
      floor.image = dataURL;
      floor.imageOpacity = 0.85;
      floor.imageTransform = { x: 0, y: 0, scale: 1 };
      saveState();
      render();
      toast(`Floor plan loaded — coordinate space set to 980 × ${floor.coordH}`, 'success');
    };
    img.src = dataURL;
  };
  reader.readAsDataURL(file);
}

// Image transform controls
function applyImageTransform() {
  const floor = S.floors[S.currentFloor];
  if (!floor.image) return;
  const W = 980, H = floor.coordH || 660;
  const t = floor.imageTransform || { x: 0, y: 0, scale: 1 };
  const imgEl = baseEl.querySelector('image');
  if (imgEl) {
    imgEl.setAttribute('x', t.x);
    imgEl.setAttribute('y', t.y);
    imgEl.setAttribute('width', W * t.scale);
    imgEl.setAttribute('height', H * t.scale);
  }
}

let rcHideTimer = null;

function showReportCard(type, id) {
  clearTimeout(rcHideTimer);
  const floor = S.floors[S.currentFloor];

  // Find item — pcs/phones share the desks array
  let item = null;
  let layerDef = null;
  const lookupKey = (type === 'pcs' || type === 'phones') ? 'desks' : type;
  if (floor.items[lookupKey]) {
    item = floor.items[lookupKey].find(x => x.id === id);
  }
  // Check custom layers
  if (!item) {
    layerDef = S.customLayers.find(l => l.id === type);
    if (layerDef && floor.items[type]) {
      item = floor.items[type].find(x => x.id === id);
    }
  }
  if (!item) return;

  const rc = document.getElementById('report-card');
  const iconEl = document.getElementById('rc-type-icon');
  const titleEl = document.getElementById('rc-title');
  const subtitleEl = document.getElementById('rc-subtitle');
  const bodyEl = document.getElementById('rc-body');

  // Determine filter definition
  const filterDef = FILTERS.find(f => f.id === type);
  const color = layerDef?.color || filterDef?.color || '#00c8ff';
  const icon = layerDef ? (CUSTOM_ICONS[layerDef.icon] || CUSTOM_ICONS.dot) : (filterDef?.icon || '');

  iconEl.style.borderColor = `${color}44`;
  iconEl.style.background = `${color}18`;
  iconEl.style.color = color;
  iconEl.innerHTML = icon;

  // Build content based on type
  let title = '', subtitle = '', sections = [];

  if (type === 'desks') {
    title = item.name || 'Unknown User';
    subtitle = 'USER DESK';
    if (item.pc || item.ip) sections.push({ title: 'WORKSTATION', rows: [
      ['Asset Tag', item.pc],
      ['IP Address', item.ip],
      ['Operating System', item.os],
      ['CPU', item.cpu],
      ['RAM', item.ram],
      ['Serial Number', item.serialNumber],
      ['Department', item.department],
      ['Location', item.location],
      ['Last Seen', item.lastSeen ? new Date(item.lastSeen).toLocaleDateString() : null],
    ]});
    sections.push({ title: 'CONTACT', rows: [
      ['Extension', item.ext || null],
      ['Has Phone', item.hasPhone ? 'Yes' : 'No'],
    ]});
    sections.push({ title: 'INTUNE / AUTOPILOT', hash: item.hardwareHash });
  } else if (type === 'pcs') {
    title = item.pc || item.name || 'Unknown PC';
    subtitle = 'WORKSTATION';
    sections.push({ title: 'IDENTITY', rows: [
      ['User', item.name],
      ['Asset Tag', item.pc],
      ['IP Address', item.ip],
    ]});
    sections.push({ title: 'HARDWARE', rows: [
      ['OS', item.os],
      ['CPU', item.cpu],
      ['RAM', item.ram],
      ['Serial', item.serialNumber],
    ]});
    sections.push({ title: 'INTUNE / AUTOPILOT', hash: item.hardwareHash });
  } else if (type === 'phones') {
    title = item.name || 'Desk Phone';
    subtitle = 'DESK PHONE';
    const rc = item.rc;
    if (rc) {
      sections.push({ title: 'STATUS', rcPresence: rc });
      sections.push({ title: 'USER', rows: [
        ['Extension', rc.ext || item.ext],
        ['Email',     rc.email],
        ['Department',rc.department],
      ]});
      sections.push({ title: 'DEVICE', rows: [
        ['Model',    rc.model],
        ['IP Address', item.ip],
      ]});
    } else {
      sections.push({ title: 'DETAILS', rows: [
        ['Extension', item.ext],
        ['IP Address', item.ip],
        ['Last Seen', item.lastSeen ? new Date(item.lastSeen).toLocaleDateString() : null],
      ]});
    }
  } else if (type === 'printers') {
    title = item.label || 'Printer';
    subtitle = 'PRINTER';
    sections.push({ title: 'DETAILS', rows: [
      ['Model', item.model],
      ['IP Address', item.ip],
      ['Location', item.location],
      ['Last Seen', item.lastSeen ? new Date(item.lastSeen).toLocaleDateString() : null],
    ]});
    sections.push({ title: 'PRINT QUEUE', jobs: item.printJobs || [] });
  } else if (type === 'network') {
    title = `Network Drop`;
    subtitle = (item.t || 'FLOOR').toUpperCase() + ' DROP';
    sections.push({ title: 'DETAILS', rows: [
      ['Type', item.t],
      ['IP', item.ip || null],
    ]});
  } else if (type === 'cameras') {
    title = item.name || 'Security Camera';
    subtitle = 'SECURITY CAMERA';
    sections.push({ title: 'LIVE FEED', feed: item.id });
    sections.push({ title: 'DETAILS', rows: [
      ['IP Address', item.ip],
      ['Location', item.location],
      ['Last Seen', item.lastSeen ? new Date(item.lastSeen).toLocaleDateString() : null],
    ]});
  } else if (layerDef) {
    title = item.name || layerDef.name;
    subtitle = layerDef.name.toUpperCase();
    sections.push({ title: 'ASSET INFO', rows: [
      ['Name', item.name],
      ['IP Address', item.ip],
      ['Type', item.rawType],
      ['Location', item.location],
      ['Last Seen', item.lastSeen ? new Date(item.lastSeen).toLocaleDateString() : null],
    ]});
  }

  titleEl.textContent = title;
  subtitleEl.textContent = subtitle;

  // Build body HTML
  bodyEl.innerHTML = sections.map(sec => {
    if (sec.feed !== undefined) {
      const cam = floor.items.cameras.find(c => c.id === sec.feed);
      const feedUrl = cam?.feedUrl || '';
      return `<div class="rc-section">
        <div class="rc-section-title">
          ${sec.title}
          ${feedUrl ? '<span class="rc-live-badge">● REC</span>' : ''}
        </div>
        <div class="rc-feed-wrap">
          ${feedUrl
            ? `<img class="rc-feed-img" src="${feedUrl}" alt="camera feed"
                 onerror="this.classList.add('rc-feed-err')">`
            : `<div class="rc-feed-nosignal">NO SIGNAL</div>`
          }
          <div class="rc-feed-scanlines"></div>
        </div>
        <input class="rc-feed-url" type="text" value="${feedUrl}"
          placeholder="http://&lt;ip&gt;/video  or  /snapshot.jpg"
          onchange="window.setCameraFeedUrl('${sec.feed}', this.value)">
      </div>`;
    }
    if (sec.rcPresence !== undefined) {
      const rc = sec.rcPresence;
      const presence = rc.presence || 'Offline';
      const tStatus  = rc.telephonyStatus || 'NoCall';
      const telephonyLabel = {
        NoCall: '', CallConnected: 'ON A CALL', Ringing: 'RINGING',
        OnHold: 'ON HOLD', ParkedCall: 'CALL PARKED',
      }[tStatus] || tStatus.replace(/([A-Z])/g, ' $1').trim().toUpperCase();

      const activeCalls = rc.activeCalls || [];
      const activeCallHtml = activeCalls.length ? `
        <div class="rc-active-call">
          <div class="rc-active-call-label">ACTIVE CALL</div>
          ${activeCalls.map(c => `
            <div class="rc-active-call-row">${c.remoteNumber || 'Unknown'}</div>
          `).join('')}
        </div>` : '';

      return `<div class="rc-section">
        <div class="rc-section-title">${sec.title}</div>
        <div class="rc-presence">
          <div class="rc-presence-dot ${presence}"></div>
          <div>
            <div class="rc-presence-text ${presence}">${presence === 'DnD' ? 'DO NOT DISTURB' : presence}</div>
            ${telephonyLabel ? `<div class="rc-telephony">${telephonyLabel}</div>` : ''}
          </div>
        </div>
        ${activeCallHtml}
      </div>`;
    }
    if (sec.jobs !== undefined) {
      const jobs = sec.jobs;
      return `<div class="rc-section">
        <div class="rc-section-title">${sec.title}${jobs.length ? ` <span style="color:rgba(0,200,255,0.4)">(${jobs.length})</span>` : ''}</div>
        ${jobs.length === 0
          ? `<div class="rc-queue-empty">QUEUE EMPTY</div>`
          : jobs.map(j => `
            <div class="rc-job">
              <div class="rc-job-dot ${j.status}"></div>
              <div class="rc-job-info">
                <div class="rc-job-name">${j.name}</div>
                <div class="rc-job-user">${j.user}</div>
              </div>
              <div class="rc-job-meta">
                <div class="rc-job-pages">${j.pages}p</div>
                <div class="rc-job-status ${j.status}">${j.status}</div>
              </div>
            </div>`).join('')
        }
      </div>`;
    }
    if (sec.hash !== undefined) {
      // Intune hash section
      return `<div class="rc-section">
        <div class="rc-section-title">${sec.title}</div>
        ${sec.hash
          ? `<div class="rc-hash-block">
              <div class="rc-hash-label">
                HARDWARE HASH
                <button class="rc-hash-copy" onclick="copyHash('${sec.hash}')">COPY</button>
              </div>
              <div class="rc-hash-value">${sec.hash.substring(0, 120)}${sec.hash.length > 120 ? '…' : ''}</div>
            </div>`
          : `<div class="rc-hash-block">
              <div class="rc-hash-label">HARDWARE HASH</div>
              <div class="rc-hash-missing">Not collected — configure Lansweeper WMI scan for MDM_DevDetail_Ext01</div>
            </div>`
        }
      </div>`;
    }
    const rows = (sec.rows || []).filter(([, v]) => v);
    if (!rows.length) return '';
    return `<div class="rc-section">
      <div class="rc-section-title">${sec.title}</div>
      ${rows.map(([label, value]) => `
        <div class="rc-row">
          <span class="rc-label">${label}</span>
          <span class="rc-value${typeof value === 'string' && value.includes('.') && value.length > 15 ? ' mono' : ''}">${value}</span>
        </div>`).join('')}
    </div>`;
  }).join('');

  rc.classList.add('visible');
}

function hideReportCard() {
  rcHideTimer = setTimeout(() => {
    document.getElementById('report-card').classList.remove('visible');
  }, 200);
}

window.setCameraFeedUrl = function(id, url) {
  const floor = S.floors[S.currentFloor];
  const cam = floor.items.cameras.find(c => c.id === id);
  if (!cam) return;
  cam.feedUrl = url.trim();
  saveState();
  showReportCard('cameras', id);
};

window.copyHash = function copyHash(hash) {
  navigator.clipboard.writeText(hash).then(() => {
    toast('Hardware hash copied to clipboard', 'success');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = hash;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('Hardware hash copied to clipboard', 'success');
  });
};

function bindHoverListeners() {
  // Pointer-events on SVG <g> elements inside rotateX() 3D transforms are
  // unreliable. Instead: listen for mousemove on document, then call
  // getBoundingClientRect() on each .ov-item to find which one the cursor
  // is visually over. getBoundingClientRect() returns real screen coordinates
  // after ALL transforms including 3D perspective — no pointer-events needed.
  let currentKey = null;
  let raf = null;

  document.addEventListener('mousemove', (e) => {
    const cx = e.clientX, cy = e.clientY;
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      raf = null;
      const items = document.querySelectorAll('.ov-item[data-id]');
      let hit = null;
      // Iterate in reverse so topmost (last in DOM) wins when items overlap
      for (let i = items.length - 1; i >= 0; i--) {
        const g = items[i];
        const r = g.getBoundingClientRect();
        if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
          hit = g;
          break;
        }
      }
      if (hit) {
        const key = hit.dataset.type + '|' + hit.dataset.id;
        if (key !== currentKey) {
          currentKey = key;
          clearTimeout(rcHideTimer);
          showReportCard(hit.dataset.type, hit.dataset.id);
        }
      } else if (currentKey !== null) {
        currentKey = null;
        hideReportCard();
      }
    });
  });

  const rc = document.getElementById('report-card');
  if (rc) {
    rc.onmouseenter = () => clearTimeout(rcHideTimer);
    rc.onmouseleave = () => hideReportCard();
  }
}

function attachItemListeners() {
  // No-op: hover detection now uses getBoundingClientRect() in bindHoverListeners().
  // This function is kept so the render() call site doesn't need to change.
}

// ═══════════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════════

function init() {
  initDOM();
  S = loadState() || defaultState();
  rebuildCustomOverlays();
  render();
  bindHoverListeners();
  checkLsStatus();
  checkRcStatus();

  // New layer button
  document.getElementById('new-layer-btn').addEventListener('click', () => openLayerModal(null));

  // Layer modal save / cancel
  document.getElementById('lm-save').addEventListener('click', saveCustomLayer);
  document.getElementById('lm-cancel').addEventListener('click', closeLayerModal);
  document.getElementById('layer-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('layer-modal')) closeLayerModal();
  });

  // Live clock
  setInterval(() => {
    const el = document.getElementById('status-time');
    if (el) el.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }, 1000);
  // Set initial time immediately
  const el = document.getElementById('status-time');
  if (el) el.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

init();
</script>
