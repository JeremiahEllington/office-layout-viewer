<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building Directory — Interactive Floor Plan</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #020912;
  --panel:        #040d1e;
  --panel-border: #0a2040;
  --cyan:         #00c8ff;
  --cyan-glow:    rgba(0,200,255,0.15);
  --cyan-dim:     #0066aa;
  --text:         #e8f4ff;
  --text-dim:     #4a7090;
  --text-muted:   #1a4060;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────── */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--panel);
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  padding: 0 0 16px;
  gap: 4px;
  z-index: 10;
}

.sb-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--cyan);
  padding: 20px 16px 14px;
  text-shadow: 0 0 12px rgba(0,200,255,0.6);
  position: relative;
}
.sb-title::after {
  content: '';
  display: block;
  position: absolute;
  bottom: 0;
  left: 12px;
  right: 12px;
  height: 1px;
  background: linear-gradient(90deg, var(--cyan) 0%, transparent 100%);
  box-shadow: 0 0 8px rgba(0,200,255,0.4);
}

.sb-section {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 12px 16px 4px;
}

/* ── Filter Buttons ──────────────────────────────────── */
.filter-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  height: 58px;
  min-height: 56px;
  border-radius: 0;
  border: none;
  border-left: 4px solid transparent;
  background: transparent;
  cursor: pointer;
  color: var(--text-dim);
  transition: background .18s, border-color .2s, color .18s, box-shadow .25s, opacity .2s;
  user-select: none;
  width: 100%;
  text-align: left;
  opacity: 0.45;
  position: relative;
}

.filter-btn:hover {
  background: rgba(0,200,255,0.04);
  color: var(--text);
  opacity: 0.75;
}

.filter-btn.active {
  border-left-color: var(--c);
  color: var(--c);
  background: color-mix(in srgb, var(--c) 10%, transparent);
  opacity: 1;
  --filter-glow: color-mix(in srgb, var(--c) 40%, transparent);
  animation: filter-pulse 2.5s ease-in-out infinite;
}

/* ── Filter Icon ─────────────────────────────────────── */
.ficon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--c) 14%, #050e20);
  border: 1px solid color-mix(in srgb, var(--c) 28%, transparent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--c);
  opacity: 0.45;
  transition: opacity .18s, box-shadow .2s;
}
.filter-btn.active .ficon {
  opacity: 1;
  box-shadow: 0 0 14px color-mix(in srgb, var(--c) 45%, transparent);
}
.ficon svg { width: 16px; height: 16px; fill: currentColor; }

.filter-btn-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  flex: 1;
}

.fbadge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 700;
  background: color-mix(in srgb, var(--c) 18%, transparent);
  color: var(--c);
  border: 1px solid color-mix(in srgb, var(--c) 30%, transparent);
  padding: 2px 8px;
  border-radius: 20px;
  opacity: 0.45;
  transition: opacity .18s;
  letter-spacing: 0.5px;
}
.filter-btn.active .fbadge { opacity: 1; }

/* ── Clear button ────────────────────────────────────── */
.sb-clear {
  margin: auto 12px 0;
  padding: 11px 16px;
  border: 1px solid var(--cyan-dim);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: color .15s, border-color .15s, background .15s, box-shadow .15s;
}
.sb-clear:hover {
  color: var(--cyan);
  border-color: var(--cyan);
  background: var(--cyan-glow);
  box-shadow: 0 0 12px rgba(0,200,255,0.2);
}

/* ── Map Area ────────────────────────────────────────── */
#map-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Topbar ──────────────────────────────────────────── */
#topbar {
  height: 56px;
  background: var(--panel);
  border-bottom: 1px solid var(--cyan);
  box-shadow: 0 1px 0 rgba(0,200,255,0.3);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  flex-shrink: 0;
  overflow: hidden;
}

/* ── Kiosk Branding ──────────────────────────────────── */
#kiosk-brand {
  display: flex;
  flex-direction: column;
  justify-content: center;
  flex-shrink: 0;
  margin-right: 6px;
  line-height: 1.15;
}
#brand-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 16px rgba(0,200,255,0.7), 0 0 32px rgba(0,200,255,0.3);
  white-space: nowrap;
}
#brand-sub {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
}

.topbar-sep {
  width: 1px;
  height: 28px;
  background: var(--panel-border);
  flex-shrink: 0;
}

/* ── Floor Tabs ──────────────────────────────────────── */
#floor-tabs {
  display: flex;
  align-items: center;
  gap: 4px;
  overflow-x: auto;
  flex: 1;
  min-width: 0;
  scrollbar-width: none;
}
#floor-tabs::-webkit-scrollbar { display: none; }

.floor-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--panel-border);
  background: transparent;
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .2s, color .15s, box-shadow .2s;
  user-select: none;
}
.floor-tab:hover {
  background: rgba(0,200,255,0.06);
  color: var(--text);
  border-color: var(--cyan-dim);
}
.floor-tab.active {
  border-color: var(--cyan);
  color: var(--bg);
  background: var(--cyan);
  box-shadow: 0 0 14px rgba(0,200,255,0.45), 0 2px 8px rgba(0,0,0,0.5);
  text-shadow: none;
}
.floor-tab.active .floor-tab-del { color: var(--bg); opacity: 0.6; }
.floor-tab-del {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 0 0 2px;
  opacity: 0.5;
  transition: opacity .15s, color .15s;
}
.floor-tab-del:hover { opacity: 1; color: #f05888; }

.topbar-add-floor {
  background: transparent;
  border: 1px dashed var(--cyan-dim);
  border-radius: 20px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: color .15s, border-color .15s, background .15s;
}
.topbar-add-floor:hover {
  color: var(--cyan);
  border-color: var(--cyan);
  background: var(--cyan-glow);
}

/* ── Topbar action buttons ───────────────────────────── */
.tb-btn {
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 12px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .2s, color .15s, box-shadow .15s;
}
.tb-btn:hover {
  background: rgba(0,200,255,0.06);
  color: var(--cyan);
  border-color: var(--cyan-dim);
}
.tb-btn.active {
  border-color: #e8b840;
  color: #e8b840;
  background: rgba(232,184,64,.08);
  box-shadow: 0 0 10px rgba(232,184,64,0.2);
}
.tb-btn.edit-active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-glow);
  box-shadow: 0 0 12px rgba(0,200,255,0.3);
}

.tb-import-wrap { position: relative; flex-shrink: 0; }
.tb-import-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: #050f22;
  border: 1px solid var(--panel-border);
  border-top: 1px solid var(--cyan);
  border-radius: 8px;
  overflow: hidden;
  z-index: 200;
  min-width: 150px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,200,255,0.1);
}
.tb-import-dropdown.open { display: block; }
.tb-import-dropdown button {
  display: block;
  width: 100%;
  padding: 10px 16px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: left;
  transition: background .12s, color .12s;
}
.tb-import-dropdown button:hover {
  background: rgba(0,200,255,0.07);
  color: var(--cyan);
}

/* ── Image opacity slider ────────────────────────────── */
#img-slider-wrap {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 6px;
  flex-shrink: 0;
}
#img-slider-wrap.show { display: flex; }
#img-opacity-slider {
  width: 70px;
  accent-color: var(--cyan);
}

/* ── Image transform controls ────────────────────────── */
#img-transform-wrap {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 6px;
  flex-shrink: 0;
}
#img-transform-wrap.show { display: flex; }
#img-transform-wrap label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
}
#img-transform-wrap input[type="range"] {
  width: 60px;
  accent-color: var(--cyan);
}
#img-reset-transform {
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: 5px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 8px;
  transition: background .12s, border-color .15s, color .12s;
  white-space: nowrap;
}
#img-reset-transform:hover {
  background: rgba(0,200,255,0.06);
  color: var(--cyan);
  border-color: var(--cyan-dim);
}

/* ── Edit Toolbar ────────────────────────────────────── */
#edit-toolbar {
  display: none;
  height: 44px;
  background: #030a18;
  border-bottom: 1px solid var(--panel-border);
  border-top: 1px solid var(--cyan);
  align-items: center;
  padding: 0 16px;
  gap: 6px;
  flex-shrink: 0;
  box-shadow: 0 -1px 0 rgba(0,200,255,0.15) inset;
}
#edit-toolbar.show { display: flex; }

.et-btn {
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 12px;
  height: 40px;
  transition: background .12s, border-color .15s, color .12s, box-shadow .15s;
  white-space: nowrap;
}
.et-btn:hover {
  background: rgba(0,200,255,0.06);
  color: var(--cyan);
  border-color: var(--cyan-dim);
}
.et-btn.active {
  background: var(--cyan);
  border-color: var(--cyan);
  color: var(--bg);
  font-weight: 700;
  box-shadow: 0 0 12px rgba(0,200,255,0.4);
}

.et-hint {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-left: 8px;
}

.et-exit {
  margin-left: auto;
  background: transparent;
  border: 1px solid rgba(240,88,136,0.35);
  border-radius: 6px;
  color: rgba(240,88,136,0.65);
  cursor: pointer;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 14px;
  height: 40px;
  transition: background .12s, border-color .15s, color .12s, box-shadow .15s;
}
.et-exit:hover {
  background: rgba(240,88,136,.12);
  border-color: #f05888;
  color: #f05888;
  box-shadow: 0 0 10px rgba(240,88,136,0.2);
}

/* ── Canvas ──────────────────────────────────────────── */
#canvas {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 50px 40px 52px;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px),
    radial-gradient(ellipse 80% 60% at 50% 30%, #071428 0%, #020912 100%);
  background-size: 40px 40px, 40px 40px, 100% 100%;
  overflow: auto;
  position: relative;
  animation: scanline 8s linear infinite;
}

/* ── 3/4 Perspective ─────────────────────────────────── */
#persp {
  perspective: 1800px;
  perspective-origin: 50% -10%;
  flex-shrink: 0;
}

#tilt {
  transform: rotateX(40deg);
  transform-origin: center top;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.22,1,.36,1);
}

/* ── Map Stack ───────────────────────────────────────── */
#stack {
  position: relative;
  width: 980px;
  box-shadow:
    0 0 0 1px rgba(0,200,255,0.15),
    0 0 40px rgba(0,200,255,0.08),
    0 80px 160px rgba(0,0,0,0.95);
  overflow: hidden;
}

#stack > * {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── Overlay Layer ───────────────────────────────────── */
.overlay {
  pointer-events: none;
  transform-origin: top center;
  transform: translateY(-108%) scaleY(.82);
  opacity: 0;
  transition:
    transform .58s cubic-bezier(.22,1,.36,1),
    opacity .4s ease;
  overflow: visible;
}

.overlay.on {
  transform: translateY(0) scaleY(1);
  opacity: 1;
}

/* ── Item rain animation ─────────────────────────────── */
@keyframes item-rain {
  0%   { transform: translateY(-80px);              opacity: 0; }
  50%  { opacity: 1; }
  68%  { transform: translateY(6px)  scaleY(0.78);  }  /* hits floor — squish  */
  80%  { transform: translateY(-7px) scaleY(1.12);  }  /* bounces up — stretch */
  90%  { transform: translateY(3px)  scaleY(0.94);  }  /* second impact        */
  96%  { transform: translateY(-1px) scaleY(1.03);  }  /* micro bounce         */
  100% { transform: translateY(0)    scaleY(1);     opacity: 1; }
}

.rain-item {
  transform-box: fill-box;
  transform-origin: center bottom; /* squish compresses toward landing point */
  animation: item-rain 0.55s linear both;
}

/* Cyan sweep flash when layer activates */
.overlay.on::after {
  content: '';
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.9), transparent);
  animation: spine-flash 0.7s ease-out forwards;
  pointer-events: none;
}

/* ── Edit layer ──────────────────────────────────────── */
#ov-edit {
  pointer-events: none;
  z-index: 50;
}
#ov-edit.active {
  pointer-events: all;
  cursor: default;
}
#ov-edit.placing {
  cursor: crosshair;
}

/* ── Status Bar ──────────────────────────────────────── */
#status-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 32px;
  background: rgba(0,10,24,0.9);
  border-top: 1px solid var(--panel-border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 20;
  backdrop-filter: blur(4px);
}

#status-time {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  min-width: 80px;
}

#status-hint {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  animation: hint-fade 3s ease-in-out infinite;
  text-align: center;
}

#status-layers {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  min-width: 130px;
  text-align: right;
  transition: color .3s;
}
#status-layers.active {
  color: var(--cyan);
  text-shadow: 0 0 10px rgba(0,200,255,0.5);
}

/* ── Add Form ────────────────────────────────────────── */
#add-form {
  display: none;
  position: fixed;
  z-index: 1000;
  background: #050d20;
  border: 1px solid var(--cyan);
  border-radius: 12px;
  padding: 18px;
  min-width: 220px;
  box-shadow:
    0 0 0 1px rgba(0,200,255,0.1),
    0 8px 40px rgba(0,0,0,0.85),
    0 0 20px rgba(0,200,255,0.1);
}
#add-form.show { display: block; }
#add-form h4 {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 14px;
  text-shadow: 0 0 10px rgba(0,200,255,0.4);
}
.af-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 10px;
}
.af-field label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.af-field input, .af-field select {
  background: #02070f;
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 7px 10px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.af-field input:focus, .af-field select:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,200,255,0.12);
}
.af-field-row {
  display: flex;
  gap: 8px;
}
.af-field-row .af-field { flex: 1; }
.af-check-row {
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
}
.af-check-row label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
}
.af-actions {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}
.af-add {
  flex: 1;
  padding: 9px;
  background: var(--cyan);
  border: none;
  border-radius: 7px;
  color: var(--bg);
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  transition: box-shadow .15s, filter .15s;
}
.af-add:hover {
  box-shadow: 0 0 16px rgba(0,200,255,0.5);
  filter: brightness(1.1);
}
.af-cancel {
  padding: 9px 14px;
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: 7px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: background .12s, border-color .15s, color .12s;
}
.af-cancel:hover {
  background: rgba(0,200,255,0.05);
  border-color: var(--cyan-dim);
  color: var(--text);
}

/* ── Import Modal ────────────────────────────────────── */
#import-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,5,16,0.85);
  align-items: center;
  justify-content: center;
  z-index: 500;
  backdrop-filter: blur(4px);
}
#import-modal.show { display: flex; }
.im-box {
  background: #040c1e;
  border: 1px solid var(--panel-border);
  border-top: 2px solid var(--cyan);
  border-radius: 12px;
  padding: 24px;
  width: 460px;
  max-width: 95vw;
  box-shadow:
    0 0 0 1px rgba(0,200,255,0.08),
    0 24px 80px rgba(0,0,0,0.9),
    0 0 40px rgba(0,200,255,0.07);
}
.im-box h3 {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 18px;
  text-shadow: 0 0 12px rgba(0,200,255,0.4);
}
.im-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}
.im-tab {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--panel-border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all .15s;
}
.im-tab.active {
  border-color: var(--cyan);
  color: var(--bg);
  background: var(--cyan);
  box-shadow: 0 0 12px rgba(0,200,255,0.35);
}
.im-panel { display: none; }
.im-panel.active { display: block; }
.im-panel textarea {
  width: 100%;
  height: 130px;
  background: #020812;
  border: 1px solid var(--panel-border);
  border-radius: 7px;
  color: var(--text);
  font-size: 11px;
  font-family: monospace;
  padding: 10px;
  resize: vertical;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.im-panel textarea:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
}
.im-panel p {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 10px;
  line-height: 1.6;
  letter-spacing: 0.5px;
}
.im-file-input {
  display: none;
}
.im-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.im-btn {
  flex: 1;
  padding: 9px;
  background: var(--cyan);
  border: none;
  border-radius: 7px;
  color: var(--bg);
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: box-shadow .15s, filter .15s;
}
.im-btn:hover {
  box-shadow: 0 0 16px rgba(0,200,255,0.45);
  filter: brightness(1.1);
}
.im-btn-file {
  padding: 9px 16px;
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: 7px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: background .12s, border-color .15s, color .12s;
}
.im-btn-file:hover {
  background: rgba(0,200,255,0.05);
  border-color: var(--cyan-dim);
  color: var(--text);
}
.im-cancel {
  padding: 9px 16px;
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: 7px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: background .12s, border-color .15s, color .12s;
}
.im-cancel:hover {
  background: rgba(0,200,255,0.05);
  border-color: var(--cyan-dim);
  color: var(--text);
}
.im-err {
  font-size: 10px;
  color: #f05888;
  margin-top: 10px;
  min-height: 16px;
  letter-spacing: 0.5px;
}

/* ── Custom Layer Buttons ────────────────────────────── */
.sb-new-layer-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px; margin-top: 4px;
  background: transparent;
  border: 1px dashed var(--cyan-dim);
  border-radius: 8px; color: var(--cyan-dim);
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: border-color .15s, color .15s;
}
.sb-new-layer-btn:hover { border-color: var(--cyan); color: var(--cyan); }

.cl-edit-btn, .cl-del-btn {
  background: none; border: none; cursor: pointer;
  font-size: 12px; padding: 0 3px; opacity: .4;
  color: var(--text); transition: opacity .15s, color .15s;
  flex-shrink: 0;
}
.cl-edit-btn:hover { opacity: 1; color: var(--cyan); }
.cl-del-btn:hover  { opacity: 1; color: #f05888; }

/* ── Layer Modal ─────────────────────────────────────── */
.im-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,5,16,0.85);
  align-items: center;
  justify-content: center;
  z-index: 500;
  backdrop-filter: blur(4px);
}
.im-modal-overlay.show { display: flex; }

.lm-color-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.lm-color-swatch {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: border-color .12s, transform .12s;
}
.lm-color-swatch.selected { border-color: #fff; transform: scale(1.2); }
.lm-icon-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.lm-icon-btn {
  width: 34px; height: 34px; border-radius: 7px; cursor: pointer;
  border: 1px solid var(--panel-border); background: var(--panel);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: border-color .12s, color .12s;
}
.lm-icon-btn svg { width: 16px; height: 16px; }
.lm-icon-btn.selected { border-color: var(--cyan); color: var(--cyan); }
.layer-modal-box { width: 380px; }

/* ── Lansweeper Sync Button ──────────────────────────── */
#ls-sync-btn { border-color: var(--cyan); color: var(--cyan); }
#ls-sync-btn.disconnected { border-color: #f05888; color: #f05888; opacity: 0.6; cursor: not-allowed; }
#ls-sync-btn.syncing #ls-sync-icon { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#ls-sync-status { font-size: 9px; color: var(--text-dim); white-space: nowrap; }

/* ── RingCentral Sync Button ─────────────────────────── */
#rc-sync-btn { border-color: #f08040; color: #f08040; }
#rc-sync-btn.disconnected { border-color: #f05888; color: #f05888; opacity: 0.6; cursor: not-allowed; }
#rc-sync-btn.syncing #rc-sync-icon { display: inline-block; animation: spin 1s linear infinite; }
#rc-sync-status { font-size: 9px; color: var(--text-dim); white-space: nowrap; }

/* ── Presence status ─────────────────────────────────── */
.rc-presence { display: flex; align-items: center; gap: 8px; padding: 8px 0 6px; }
.rc-presence-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.rc-presence-dot.Available  { background: #40d080; box-shadow: 0 0 6px #40d080; }
.rc-presence-dot.Busy       { background: #f04040; box-shadow: 0 0 6px #f04040; }
.rc-presence-dot.DnD        { background: #f08040; box-shadow: 0 0 4px #f08040; }
.rc-presence-dot.Offline    { background: rgba(0,200,255,0.2); }
.rc-presence-text {
  font-size: 11px; font-family: 'Courier New', monospace;
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
}
.rc-presence-text.Available { color: #40d080; }
.rc-presence-text.Busy      { color: #f04040; }
.rc-presence-text.DnD       { color: #f08040; }
.rc-presence-text.Offline   { color: rgba(0,200,255,0.3); }
.rc-telephony {
  font-size: 8px; color: rgba(0,200,255,0.5);
  font-family: 'Courier New', monospace; letter-spacing: 1px;
  text-transform: uppercase; margin-top: 1px;
}
.rc-active-call {
  background: rgba(240,64,64,0.08);
  border: 1px solid rgba(240,64,64,0.3);
  padding: 7px 10px; margin-top: 4px;
}
.rc-active-call-label {
  font-size: 7.5px; letter-spacing: 2.5px; text-transform: uppercase;
  color: #f04040; font-family: 'Courier New', monospace;
  margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
}
.rc-active-call-label::before {
  content: ''; display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: #f04040; box-shadow: 0 0 4px #f04040;
  animation: rc-blink 1s step-start infinite;
}
.rc-active-call-row {
  font-size: 9px; color: rgba(200,240,255,0.8);
  font-family: 'Courier New', monospace;
}

/* ── Staging Dock ────────────────────────────────────── */
#staging-dock {
  display: none;
  background: rgba(0,10,24,0.95);
  border-top: 1px solid var(--cyan);
  box-shadow: 0 -4px 20px rgba(0,200,255,0.1);
  padding: 8px 16px;
  flex-shrink: 0;
}
#staging-dock.show { display: block; }
#staging-dock-header {
  display: flex; align-items: center; gap: 12px;
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  color: var(--cyan); margin-bottom: 8px;
}
#staging-count {
  background: var(--cyan); color: #000;
  padding: 1px 6px; border-radius: 10px; font-size: 9px;
}
.staging-hint { color: var(--text-muted); margin-left: auto; }
#staging-items { display: flex; gap: 8px; flex-wrap: wrap; }
.staging-chip {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,200,255,0.06);
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 6px; padding: 5px 10px;
  font-size: 11px; color: var(--text);
}
.staging-chip .chip-type { font-size: 9px; color: var(--text-dim); }
.staging-chip .chip-place {
  background: var(--cyan); color: #000;
  border: none; border-radius: 4px;
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  cursor: pointer; letter-spacing: 1px;
}

/* ── Keyframe Animations ─────────────────────────────── */

@keyframes filter-pulse {
  0%, 100% { box-shadow: 0 0 8px var(--filter-glow, transparent); }
  50%       { box-shadow: 0 0 20px var(--filter-glow, transparent); }
}

@keyframes spine-flash {
  0%   { opacity: 1; width: 100%; }
  100% { opacity: 0; width: 0%; }
}

@keyframes scanline {
  0%   { background-position: 0 0, 0 0, center; }
  100% { background-position: 0 40px, 0 40px, center; }
}

@keyframes hint-fade {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.8; }
}

@keyframes slideInRight {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ── Overlay item hover ──────────────────────── */
.ov-item {
  pointer-events: all;
  cursor: pointer;
}
.ov-item:hover { filter: brightness(1.3) drop-shadow(0 0 6px currentColor); }

/* ── Report Card ────────────────────────────── */
#report-card {
  /* Metal Gear Solid codec aesthetic — flat tactical readout panel */
  position: fixed;
  right: -360px;
  top: 50%;
  transform: translateY(-50%);
  width: 310px;
  background: rgb(2, 6, 18);
  border: 1px solid rgba(0,200,255,0.65);
  border-radius: 0;
  box-shadow:
    inset 0 0 0 1px rgba(0,200,255,0.07),
    inset 3px 0 0 rgba(0,200,255,0.18),
    -6px 0 60px rgba(0,0,0,0.95),
    0 0 40px rgba(0,200,255,0.1);
  z-index: 300;
  transition: right 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
  pointer-events: none;
}
/* Scanlines */
#report-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,200,255,0.018) 3px,
    rgba(0,200,255,0.018) 4px
  );
  pointer-events: none;
  z-index: 10;
}
/* Top accent strip */
#report-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.9) 30%, rgba(0,200,255,0.9) 70%, transparent);
}
#report-card.visible {
  right: 0;
  pointer-events: all;
}
#rc-header {
  background: rgba(0,200,255,0.06);
  border-bottom: 2px solid rgba(0,200,255,0.35);
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 11px;
  position: relative;
}
#rc-type-icon {
  width: 34px; height: 34px;
  border-radius: 0;
  background: rgba(0,200,255,0.08);
  border: 1px solid rgba(0,200,255,0.5);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#rc-type-icon svg { width: 16px; height: 16px; }
#rc-title {
  font-size: 12px; font-weight: 700; color: var(--cyan);
  font-family: 'Courier New', monospace;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  line-height: 1.2;
}
#rc-subtitle {
  font-size: 9px; color: rgba(0,200,255,0.5);
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  margin-top: 2px;
}
#rc-body { padding: 10px 14px; overflow-y: auto; max-height: 70vh; }
.rc-section {
  margin-bottom: 12px;
}
.rc-section-title {
  font-size: 7.5px;
  font-weight: 700;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: rgba(0,200,255,0.6);
  font-family: 'Courier New', monospace;
  margin-bottom: 6px;
  padding-bottom: 3px;
  border-bottom: 1px solid rgba(0,200,255,0.2);
}
.rc-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid rgba(0,200,255,0.05);
}
.rc-label {
  font-size: 8.5px;
  color: rgba(0,200,255,0.45);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-family: 'Courier New', monospace;
  white-space: nowrap;
  flex-shrink: 0;
}
.rc-value {
  font-size: 9.5px;
  color: rgba(200,240,255,0.9);
  text-align: right;
  font-family: 'Courier New', monospace;
  word-break: break-all;
}
.rc-value.mono { font-size: 9px; }
.rc-value.empty { color: rgba(0,200,255,0.25); font-style: italic; }

/* Intune hash block */
.rc-hash-block {
  background: rgba(0,200,255,0.03);
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 0;
  padding: 8px 10px;
  margin-top: 4px;
}
.rc-hash-label {
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--cyan); margin-bottom: 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.rc-hash-copy {
  background: rgba(0,200,255,0.15);
  border: 1px solid rgba(0,200,255,0.3);
  border-radius: 4px; padding: 2px 8px;
  color: var(--cyan); font-size: 9px; font-weight: 700;
  cursor: pointer; letter-spacing: 1px;
  transition: background .12s;
}
.rc-hash-copy:hover { background: rgba(0,200,255,0.3); }
.rc-hash-value {
  font-family: monospace; font-size: 8px; color: var(--text);
  word-break: break-all; line-height: 1.5;
  max-height: 60px; overflow: hidden;
}
.rc-hash-missing {
  font-size: 9px; color: var(--text-muted); font-style: italic;
}

/* Camera live feed */
.rc-live-badge {
  float: right;
  color: #f04040;
  font-size: 7px;
  letter-spacing: 1.5px;
  animation: rc-blink 1.2s step-start infinite;
}
@keyframes rc-blink { 50% { opacity: 0; } }
.rc-feed-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border: 1px solid rgba(0,200,255,0.25);
  overflow: hidden;
  margin-bottom: 6px;
}
.rc-feed-img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.rc-feed-img.rc-feed-err {
  display: none;
}
.rc-feed-img.rc-feed-err + .rc-feed-scanlines::before {
  content: 'NO SIGNAL';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,200,255,0.3);
  font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 3px;
}
.rc-feed-nosignal {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,200,255,0.25);
  font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 3px;
}
.rc-feed-scanlines {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.25) 2px, rgba(0,0,0,0.25) 4px
  );
}
.rc-feed-url {
  width: 100%; box-sizing: border-box;
  background: rgba(0,200,255,0.04);
  border: 1px solid rgba(0,200,255,0.2);
  color: rgba(200,240,255,0.7);
  font-family: 'Courier New', monospace;
  font-size: 8px;
  padding: 5px 7px;
  outline: none;
  letter-spacing: 0.5px;
}
.rc-feed-url:focus { border-color: rgba(0,200,255,0.5); }

/* Printer job queue */
.rc-queue-empty {
  font-size: 9px; color: rgba(0,200,255,0.25);
  font-family: 'Courier New', monospace;
  letter-spacing: 2px; padding: 8px 0;
  text-align: center;
}
.rc-job {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: 6px;
  align-items: start;
  padding: 5px 0;
  border-bottom: 1px solid rgba(0,200,255,0.05);
}
.rc-job:last-child { border-bottom: none; }
.rc-job-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-top: 3px;
  flex-shrink: 0;
}
.rc-job-dot.printing { background: #40d080; box-shadow: 0 0 4px #40d080; }
.rc-job-dot.pending  { background: #f0c040; }
.rc-job-dot.error    { background: #f04040; box-shadow: 0 0 4px #f04040; }
.rc-job-info { min-width: 0; }
.rc-job-name {
  font-size: 9px; color: rgba(200,240,255,0.9);
  font-family: 'Courier New', monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rc-job-user {
  font-size: 7.5px; color: rgba(0,200,255,0.45);
  font-family: 'Courier New', monospace;
  letter-spacing: 0.5px; margin-top: 1px;
}
.rc-job-meta {
  text-align: right; flex-shrink: 0;
}
.rc-job-pages {
  font-size: 8px; color: rgba(0,200,255,0.5);
  font-family: 'Courier New', monospace;
}
.rc-job-status {
  font-size: 7px; letter-spacing: 1px; text-transform: uppercase;
  font-family: 'Courier New', monospace; margin-top: 1px;
}
.rc-job-status.printing { color: #40d080; }
.rc-job-status.pending  { color: #f0c040; }
.rc-job-status.error    { color: #f04040; }
</style>
</head>

<div id="sidebar">
  <div class="sb-title">Overlay Layers</div>
  <div id="filter-list"></div>
  <div class="sb-section" id="custom-layers-label">CUSTOM LAYERS</div>
  <div id="custom-layer-list"></div>
  <button class="sb-new-layer-btn" id="new-layer-btn">＋ NEW LAYER</button>
  <button class="sb-clear" id="clear-btn">Clear All</button>
</div>

<div id="map-area">
  <!-- Topbar -->
  <div id="topbar">
    <div id="kiosk-brand">
      <div id="brand-title">Building Directory</div>
      <div id="brand-sub">Interactive Floor Plan</div>
    </div>
    <div class="topbar-sep"></div>
    <div id="floor-tabs"></div>
    <button class="topbar-add-floor" id="add-floor-btn" title="Add Floor">+</button>
    <div class="topbar-sep"></div>
    <div id="img-slider-wrap">
      <span>Opacity</span>
      <input type="range" id="img-opacity-slider" min="0" max="1" step="0.05" value="0.85">
    </div>
    <div id="img-transform-wrap">
      <label>Scale <input type="range" id="img-scale" min="0.5" max="3" step="0.05" value="1"></label>
      <label>X <input type="range" id="img-pan-x" min="-500" max="500" step="5" value="0"></label>
      <label>Y <input type="range" id="img-pan-y" min="-500" max="500" step="5" value="0"></label>
      <button id="img-reset-transform">Reset</button>
    </div>
    <button class="tb-btn" id="upload-map-btn">Upload Map</button>
    <div class="tb-import-wrap">
      <button class="tb-btn" id="import-btn">Import ▾</button>
      <div class="tb-import-dropdown" id="import-dropdown">
        <button id="import-json-btn">JSON</button>
        <button id="import-csv-btn">CSV</button>
        <button id="csv-template-btn">CSV Template</button>
      </div>
    </div>
    <button class="tb-btn" id="export-btn">Export JSON</button>
    <button class="tb-btn" id="ls-sync-btn" title="Sync assets from Lansweeper">
      <span id="ls-sync-icon">⟳</span> LANSWEEPER
    </button>
    <span id="ls-sync-status"></span>
    <button class="tb-btn" id="rc-sync-btn" title="Sync desk phones from RingCentral">
      <span id="rc-sync-icon">⟳</span> RINGCENTRAL
    </button>
    <span id="rc-sync-status"></span>
    <button class="tb-btn" id="edit-mode-btn">Edit Mode</button>
  </div>

  <!-- Edit Toolbar -->
  <div id="edit-toolbar">
    <button class="et-btn" data-place="desks">+ Desk</button>
    <button class="et-btn" data-place="printers">+ Printer</button>

let S = null;

function defaultState() {
  return {
    floors: [ makeFloor1(), makeEmptyFloor('Floor 2') ],
    currentFloor: 0,
    filters: [],
    editMode: false,
    placingType: null,
    lsLastSync: null,
    lsConnected: false,
    customLayers: [],
  };
}

function saveState() {
  try { localStorage.setItem('office-layout-v1', JSON.stringify(S)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('office-layout-v1');
    if (raw) {
      const parsed = JSON.parse(raw);
      // Validate basic structure
      if (parsed && Array.isArray(parsed.floors) && parsed.floors.length > 0) {
        parsed.editMode = false;
        parsed.placingType = null;
        // Ensure LS fields exist
        if (parsed.lsLastSync === undefined) parsed.lsLastSync = null;
        if (parsed.lsConnected === undefined) parsed.lsConnected = false;
        // Migrate floors that predate coordH
        for (const fl of parsed.floors) {
          if (fl.coordH === undefined) fl.coordH = 660;
          if (fl.imageTransform === undefined) fl.imageTransform = { x: 0, y: 0, scale: 1 };
        }
        // Migrate: ensure customLayers exists
        if (!Array.isArray(parsed.customLayers)) parsed.customLayers = [];
        return parsed;
      }
    }
  } catch(e) {}
  return null;
}

// Persistent lsPositions store (keyed by lsId → {x, y})
function loadLsPositions() {
  try {
    const raw = localStorage.getItem('ls-positions-v1');
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveLsPositions(positions) {
  try { localStorage.setItem('ls-positions-v1', JSON.stringify(positions)); } catch(e) {}
}

function savePosition(lsId, x, y) {
  if (!lsId) return;
  const positions = loadLsPositions();
  positions[lsId] = { x, y };
  saveLsPositions(positions);
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.style.cssText = `
    background: ${type === 'error' ? '#1a0810' : type === 'success' ? '#081a10' : '#080e1c'};
    border: 1px solid ${type === 'error' ? '#f05888' : type === 'success' ? '#50d890' : 'var(--cyan)'};
    color: ${type === 'error' ? '#f05888' : type === 'success' ? '#50d890' : 'var(--text)'};
    padding: 10px 16px; border-radius: 8px; font-size: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    animation: slideInRight 0.3s ease;
    max-width: 320px; letter-spacing: 0.5px;
  `;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

// LANSWEEPER INTEGRATION
// ═══════════════════════════════════════════════════════

function checkLsStatus() {
  const btn = document.getElementById('ls-sync-btn');
  fetch('/api/status')
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        S.lsConnected = true;
        btn.classList.remove('disconnected');
        btn.title = data.configured
          ? 'Sync assets from Lansweeper'
          : 'Server reachable but Lansweeper not configured — edit lansweeper.config.json';
      } else {
        S.lsConnected = false;
        btn.classList.add('disconnected');
        btn.title = 'Lansweeper not configured';
      }
    })
    .catch(() => {
      S.lsConnected = false;
      btn.classList.add('disconnected');
      btn.title = 'Start server to enable Lansweeper sync';
    });
}

function syncLansweeper() {
  if (!S.lsConnected) {
    toast('Server not reachable. Run: node server.js', 'error');
    return;
  }
  const btn      = document.getElementById('ls-sync-btn');
  const statusEl = document.getElementById('ls-sync-status');
  btn.classList.add('syncing');
  statusEl.textContent = 'Syncing...';

  fetch('/api/sync')
    .then(r => r.json())
    .then(data => {
      btn.classList.remove('syncing');
      if (!data.ok) {
        statusEl.textContent = 'Error';
        toast('Sync failed: ' + (data.error || 'unknown error'), 'error');
        return;
      }
      S.lsLastSync = data.synced;
      const ts = new Date(data.synced).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      statusEl.textContent = 'Last: ' + ts;
      const counts = mergeAssets(data);
      saveState();
      render();
      toast(
        `Sync complete — ${counts.updated} updated, ${counts.added} added, ${counts.skipped} skipped`,
        'success'
      );
    })
    .catch(err => {
      btn.classList.remove('syncing');
      statusEl.textContent = 'Error';
      toast('Sync error: ' + err.message, 'error');
    });
}

function checkRcStatus() {

    });
}

function syncRingCentral() {
  if (!S.rcConnected) {
    toast('Server not reachable or RingCentral not configured', 'error');
    return;
  }
  const btn      = document.getElementById('rc-sync-btn');
  const statusEl = document.getElementById('rc-sync-status');
  btn.classList.add('syncing');
  statusEl.textContent = 'Syncing...';

  fetch('/api/ringcentral')
    .then(r => r.json())
    .then(data => {
      btn.classList.remove('syncing');
      if (!data.ok) {
        statusEl.textContent = 'Error';
        toast('RC sync failed: ' + (data.error || 'unknown error'), 'error');
        return;
      }
      const ts = new Date(data.synced).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      statusEl.textContent = 'Last: ' + ts;
      const count = mergeRingCentral(data.extensions || []);
      saveState();
      render();
      toast(`RingCentral sync — ${count} extensions merged`, 'success');
    })
    .catch(err => {
      btn.classList.remove('syncing');
      statusEl.textContent = 'Error';
      toast('RC sync error: ' + err.message, 'error');
    });
}

function mergeRingCentral(extensions) {
  let merged = 0;
  for (const floor of S.floors) {
    for (const desk of (floor.items.desks || [])) {
      if (!desk.hasPhone) continue;
      // Match by extension number first, then by name
      const match = extensions.find(e => e.ext && e.ext === String(desk.ext)) ||
                    extensions.find(e => e.name && desk.name &&
                      e.name.toLowerCase() === desk.name.toLowerCase());
      if (match) {
        desk.rc = {
          rcId:            match.rcId,
          ext:             match.ext,
          email:           match.email,
          department:      match.department,
          presence:        match.presence,
          telephonyStatus: match.telephonyStatus,
          dndStatus:       match.dndStatus,
          model:           match.model,
          activeCalls:     match.activeCalls || [],
        };
        merged++;
      }
    }
  }
  return merged;
}

function mergeAssets(data) {
  const floor     = S.floors[S.currentFloor];
  const positions = loadLsPositions();
  let updated = 0, added = 0, skipped = 0;

  // ── PCs → desks ──
  for (const pc of (data.pcs || [])) {
    const existing = floor.items.desks.find(d =>
      (d.lsId && d.lsId === pc.lsId) || (d.pc && d.pc === pc.pc)
    );
    if (existing) {
      existing.name         = pc.name;
      existing.lsId         = pc.lsId;
      existing.lsLastSeen   = pc.lastSeen;
      existing.os           = pc.os           || existing.os           || '';
      existing.department   = pc.department   || existing.department   || '';
      existing.location     = pc.location     || existing.location     || '';
      existing.serialNumber = pc.serialNumber || existing.serialNumber || '';
      existing.ram          = pc.ram          || existing.ram          || '';
      existing.cpu          = pc.cpu          || existing.cpu          || '';
      existing.hardwareHash = pc.hardwareHash ?? existing.hardwareHash ?? null;
      existing.ip           = pc.ip           || existing.ip           || '';
      existing.lastSeen     = pc.lastSeen     || existing.lastSeen;
      updated++;
    } else {
      const savedPos = positions[pc.lsId] || {};
      floor.items.desks.push({
        id:           generateId(),
        x:            savedPos.x !== undefined ? savedPos.x : null,
        y:            savedPos.y !== undefined ? savedPos.y : null,
        name:         pc.name,
        pc:           pc.pc,
        ext:          '',
        hasPC:        true,
        hasPhone:     false,
        lsId:         pc.lsId,
        ip:           pc.ip,
        os:           pc.os,
        department:   pc.department,
        location:     pc.location,
        serialNumber: pc.serialNumber,
        ram:          pc.ram,
        cpu:          pc.cpu,
        hardwareHash: pc.hardwareHash,
        lastSeen:     pc.lastSeen,
      });
      added++;
    }
  }

  // ── Printers ──
  for (const pr of (data.printers || [])) {
    const existing = floor.items.printers.find(p =>
      (p.lsId && p.lsId === pr.lsId) || (p.label && p.label === pr.label)
    );
    if (existing) {
      existing.lsId       = pr.lsId;
      existing.lsLastSeen = pr.lastSeen;
      existing.model      = pr.model || existing.model;
      updated++;
    } else {
      const savedPos = positions[pr.lsId] || {};
      floor.items.printers.push({
        id:         generateId(),
        x:          savedPos.x !== undefined ? savedPos.x : null,
        y:          savedPos.y !== undefined ? savedPos.y : null,
        label:      pr.label,
        model:      pr.model,
        lsId:       pr.lsId,
        lsLastSeen: pr.lastSeen,
        location:   pr.location,
      });
      added++;
    }
  }

  // ── Cameras ──
  for (const cam of (data.cameras || [])) {
    const existing = floor.items.cameras.find(c =>
      (c.lsId && c.lsId === cam.lsId) || (c.name && c.name === cam.name)
    );
    if (existing) {
      existing.lsId       = cam.lsId;
      existing.lsLastSeen = cam.lastSeen;
      updated++;
    } else {
      const savedPos = positions[cam.lsId] || {};
      floor.items.cameras.push({
        id:         generateId(),
        x:          savedPos.x !== undefined ? savedPos.x : null,
        y:          savedPos.y !== undefined ? savedPos.y : null,
        name:       cam.name,
        lsId:       cam.lsId,
        lsLastSeen: cam.lastSeen,
        location:   cam.location,
      });
      added++;
    }
  }

  // ── Phones → try to match desk by username ──
  for (const ph of (data.phones || [])) {
    // Try to find a matching desk
    const matchedDesk = floor.items.desks.find(d =>
      (ph.lsId && d.lsId === ph.lsId) ||
      (ph.name && d.name && d.name.toLowerCase() === ph.name.toLowerCase())
    );
    if (matchedDesk) {
      matchedDesk.hasPhone = true;
      matchedDesk.ext      = ph.ip || matchedDesk.ext;
      updated++;
    } else {
      skipped++;
    }
  }

  // ── Custom layers: filter from unknown assets by lsTypes ──
  const unknown = data.unknown || [];
  for (const layer of (S.customLayers || [])) {
    if (!layer.lsTypes.length) continue;
    const matches = unknown.filter(a =>
      layer.lsTypes.includes((a.rawType || '').toLowerCase().trim())
    );
    const existingItems = (floor.items[layer.id] || []).slice();
    floor.items[layer.id] = floor.items[layer.id] || [];

    for (const asset of matches) {
      const existing = existingItems.find(it => it.lsId === asset.lsId);
      const savedPos = positions[asset.lsId];
      if (existing) {
        existing.name     = asset.name     || existing.name;
        existing.ip       = asset.ip       || existing.ip;
        existing.lastSeen = asset.lastSeen;
        updated++;
      } else {
        floor.items[layer.id].push({
          id:       generateId(),
          lsId:     asset.lsId,
          name:     asset.name || asset.deviceName || '',
          ip:       asset.ip || '',
          lastSeen: asset.lastSeen,
          rawType:  asset.rawType,
          x:        savedPos ? savedPos.x : null,
          y:        savedPos ? savedPos.y : null,
        });
        added++;
      }
    }
  }

  return { updated, added, skipped };
}

function getUnpositioned() {
  const floor  = S.floors[S.currentFloor];
  const result = [];
  for (const d of floor.items.desks) {
    if (d.x === null || d.x === undefined) result.push({ type: 'desk', item: d });
  }
  for (const p of floor.items.printers) {
    if (p.x === null || p.x === undefined) result.push({ type: 'printer', item: p });
  }
  for (const c of floor.items.cameras) {
    if (c.x === null || c.x === undefined) result.push({ type: 'camera', item: c });
  }
  // Custom layers
  for (const layer of (S.customLayers || [])) {
    for (const item of (floor.items[layer.id] || [])) {
      if (item.x === null || item.x === undefined) {
        result.push({ type: layer.id, item, layerName: layer.name, color: layer.color });
      }
    }
  }
  return result;
}

function renderStagingDock() {
  const dock      = document.getElementById('staging-dock');
  const countEl   = document.getElementById('staging-count');
  const itemsEl   = document.getElementById('staging-items');
  const unpos     = getUnpositioned();

  if (unpos.length === 0) {
    dock.classList.remove('show');
    return;
  }

  dock.classList.add('show');
  countEl.textContent = unpos.length;
  itemsEl.innerHTML   = '';

  const typeColors = { desk: '#e8b840', printer: '#f07850', camera: '#f05888' };

  for (const { type, item, layerName, color: layerColor } of unpos) {
    const chip = document.createElement('div');
    chip.className = 'staging-chip';
    const label = item.name || item.label || item.lsId || type;
    const color = layerColor || typeColors[type] || 'var(--cyan)';
    const displayType = layerName || type;
    chip.innerHTML = `
      <span class="chip-type" style="color:${color}">${displayType.toUpperCase()}</span>
      <span>${label}</span>
      <button class="chip-place" data-ls-id="${item.lsId || ''}" data-item-id="${item.id}" data-item-type="${type}">PLACE</button>
    `;
    itemsEl.appendChild(chip);
  }

  // Bind PLACE buttons
  itemsEl.querySelectorAll('.chip-place').forEach(btn => {
    btn.addEventListener('click', () => {
      const itemId   = btn.dataset.itemId;
      const itemType = btn.dataset.itemType;
      const lsId     = btn.dataset.lsId;
      const floor    = S.floors[S.currentFloor];
      // Support built-in keys and custom layer IDs
      let arrKey = itemType === 'desk' ? 'desks' : itemType === 'printer' ? 'printers' : itemType === 'camera' ? 'cameras' : itemType;
      const arr = floor.items[arrKey];
      const item = arr ? arr.find(i => i.id === itemId) : null;
      if (!item) return;

      if (!S.editMode) {
        S.editMode = true;
        S.placingType = null;
      }
      item.x = 490;
      item.y = Math.round((floor.coordH || 660) / 2);
      if (lsId) savePosition(lsId, item.x, item.y);
      saveState();
      render();
    });
  });
}

      <rect x="${p.x-24}" y="${p.y-17}" width="48" height="8" rx="1" fill="${c}" opacity=".25"/>
      <rect x="${p.x-18}" y="${p.y-4}" width="36" height="16" rx="2" fill="${c}" opacity=".12" stroke="${c}" stroke-width=".8"/>
      <text x="${p.x}" y="${p.y+7}" text-anchor="middle"
        fill="${c}" font-size="8.5" font-weight="700" font-family="'Segoe UI',sans-serif"
        filter="drop-shadow(0 1px 2px rgba(0,0,0,.9))" pointer-events="none">${p.label}</text>
      <text x="${p.x}" y="${p.y+18}" text-anchor="middle"
        fill="${c}" font-size="6.5" font-family="'Segoe UI',sans-serif" opacity=".7"
        filter="drop-shadow(0 1px 2px rgba(0,0,0,.9))" pointer-events="none">${p.model||''}</text>
    </g>
  `).join(''));
}

function overlayNetwork(floor, settled = false) {
  const c = '#b068f0';
  const netDrops = floor.items.network;
  const patchStart = netDrops.findIndex(d => d.t === 'patch');
  const drops = netDrops.map((d,i) => {
    const r = d.t === 'wall' ? 6 : d.t === 'patch' ? 7 : 4.5;
    const patchIdx = d.t === 'patch' ? i - patchStart : -1;
    const label = d.t === 'patch'
      ? `<text x="${d.x}" y="${d.y+18}" text-anchor="middle" fill="${c}" font-size="5.5" font-family="monospace" opacity=".75">PP${String(patchIdx).padStart(2,'0')}</text>`
      : '';
    return `<g data-id="${d.id}" data-type="network" class="ov-item${settled ? '' : ' rain-item'}" style="${settled ? '' : `animation-delay:${(i*0.025).toFixed(2)}s`}">
      <circle cx="${d.x}" cy="${d.y}" r="${r+4}" fill="transparent" pointer-events="all"/>
      <circle cx="${d.x}" cy="${d.y}" r="${r}"
        fill="rgba(20,8,40,.85)" stroke="${c}" stroke-width="1.2"/>
      <circle cx="${d.x}" cy="${d.y}" r="1.8" fill="${c}" opacity=".9" pointer-events="none"/>
      ${label}
    </g>`;
  }).join('');
  return shell(floor, c, 'NETWORK DROPS', drops);
}

function overlayCameras(floor, settled = false) {
  const c = '#f05888';
  const cameras = floor.items.cameras.filter(cam => cam.x !== null && cam.x !== undefined);
  const cams = cameras.map((cam,i) => {
    const dir = cam.x < 490 ? 1 : -1;
    return `<g data-id="${cam.id}" data-type="cameras" class="ov-item${settled ? '' : ' rain-item'}" style="${settled ? '' : `animation-delay:${(i*0.07).toFixed(2)}s`}">
      <rect x="${cam.x + (dir > 0 ? -8 : -30)}" y="${cam.y-12}" width="38" height="24" fill="transparent" pointer-events="all"/>
      <polygon points="${cam.x},${cam.y-10} ${cam.x+dir*22},${cam.y-5} ${cam.x+dir*22},${cam.y+5} ${cam.x},${cam.y+10}"
        fill="rgba(40,8,20,.88)" stroke="${c}" stroke-width="1.3"/>
      <circle cx="${cam.x}" cy="${cam.y}" r="6" fill="rgba(240,88,136,.2)" stroke="${c}" stroke-width="1"/>
      <circle cx="${cam.x}" cy="${cam.y}" r="2.5" fill="${c}" pointer-events="none"/>
      <circle cx="${cam.x}" cy="${cam.y}" r="4.5" fill="none" stroke="${c}" stroke-width=".7" opacity=".5" pointer-events="none"/>
      <text x="${cam.x+dir*30}" y="${cam.y+4}" text-anchor="${dir>0?'start':'end'}"
        fill="${c}" font-size="7.5" font-weight="700" font-family="monospace"
        filter="drop-shadow(0 1px 2px rgba(0,0,0,.9))" pointer-events="none">CAM-${String(i+1).padStart(2,'0')}</text>
    </g>`;
  }).join('');
  return shell(floor, c, 'SECURITY CAMERAS', cams);
}

const OVERLAY_BUILDERS = {
  desks:    overlayDesks,
  pcs:      overlayPCs,
  phones:   overlayPhones,
  printers: overlayPrinters,
  network:  overlayNetwork,
  cameras:  overlayCameras,
};

// ═══════════════════════════════════════════════════════
// EDIT LAYER
// ═══════════════════════════════════════════════════════

function buildEditLayer(floor) {
  const W = 980, H = floor.coordH || 660;
  const items = [];
  for (const d of floor.items.desks) {
    if (d.x === null || d.x === undefined) continue;
    const cx = d.x + 41, cy = d.y + 25;
    items.push(`<circle data-id="${d.id}" data-type="desks" cx="${cx}" cy="${cy}" r="16"
      fill="rgba(232,184,64,.25)" stroke="#e8b840" stroke-width="1.8" style="cursor:move"/>
      <text data-id="${d.id}" data-type="desks" x="${cx}" y="${cy+4}" text-anchor="middle"
        fill="#e8b840" font-size="10" font-weight="700" font-family="'Segoe UI',sans-serif"
        style="pointer-events:none">D</text>`);
  }
  for (const p of floor.items.printers) {
    if (p.x === null || p.x === undefined) continue;
    items.push(`<circle data-id="${p.id}" data-type="printers" cx="${p.x}" cy="${p.y}" r="16"
      fill="rgba(240,120,80,.25)" stroke="#f07850" stroke-width="1.8" style="cursor:move"/>
      <text data-id="${p.id}" data-type="printers" x="${p.x}" y="${p.y+4}" text-anchor="middle"
        fill="#f07850" font-size="10" font-weight="700" font-family="'Segoe UI',sans-serif"
        style="pointer-events:none">P</text>`);
  }
  for (const n of floor.items.network) {
    items.push(`<circle data-id="${n.id}" data-type="network" cx="${n.x}" cy="${n.y}" r="10"
      fill="rgba(176,104,240,.25)" stroke="#b068f0" stroke-width="1.5" style="cursor:move"/>
      <text data-id="${n.id}" data-type="network" x="${n.x}" y="${n.y+4}" text-anchor="middle"
        fill="#b068f0" font-size="8" font-weight="700" font-family="'Segoe UI',sans-serif"
        style="pointer-events:none">N</text>`);
  }
  for (const cam of floor.items.cameras) {
    if (cam.x === null || cam.x === undefined) continue;
    items.push(`<circle data-id="${cam.id}" data-type="cameras" cx="${cam.x}" cy="${cam.y}" r="12"
      fill="rgba(240,88,136,.25)" stroke="#f05888" stroke-width="1.5" style="cursor:move"/>
      <text data-id="${cam.id}" data-type="cameras" x="${cam.x}" y="${cam.y+4}" text-anchor="middle"
        fill="#f05888" font-size="8" font-weight="700" font-family="'Segoe UI',sans-serif"
        style="pointer-events:none">C</text>`);
  }
  // Custom layer items
  for (const layer of (S.customLayers || [])) {
    for (const item of (floor.items[layer.id] || [])) {
      if (item.x === null || item.x === undefined) continue;
      items.push(`<g data-type="${layer.id}" data-id="${item.id}" style="cursor:grab">
        <circle cx="${item.x}" cy="${item.y}" r="12"
          fill="${layer.color}" opacity=".9" stroke="white" stroke-width="1.5"/>
        <text x="${item.x}" y="${item.y+4}" text-anchor="middle"
          fill="white" font-size="8" font-weight="700" font-family="'Segoe UI',sans-serif"
          style="pointer-events:none">${layer.name.substring(0,3).toUpperCase()}</text>
      </g>`);
    }
  }

  return `<svg id="edit-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" overflow="visible">
  ${items.join('\n')}
</svg>`;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

const stackEl      = document.getElementById('stack');
const filterListEl = document.getElementById('filter-list');
const floorTabsEl  = document.getElementById('floor-tabs');
const editToolbar  = document.getElementById('edit-toolbar');
const editModeBtn  = document.getElementById('edit-mode-btn');
const tiltEl       = document.getElementById('tilt');
const imgSliderWrap= document.getElementById('img-slider-wrap');
const imgSlider    = document.getElementById('img-opacity-slider');

// Overlay divs — created once
const overlayEls = {};
const filterBtnEls = {};
let baseEl = null;
let editOvEl = null;
let customOverlayEls = {};

function initDOM() {
  // Base map layer
  baseEl = document.createElement('div');
  baseEl.id = 'base-map';
  stackEl.appendChild(baseEl);

  // Overlay layers
  for (const f of FILTERS) {
    const ov = document.createElement('div');
    ov.className = 'overlay';
    ov.id = `ov-${f.id}`;
    stackEl.appendChild(ov);
    overlayEls[f.id] = ov;

    // Filter button
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.style.setProperty('--c', f.color);
    btn.innerHTML = `
      <span class="ficon">${f.icon}</span>
      <span class="filter-btn-label">${f.label}</span>
      <span class="fbadge" id="badge-${f.id}">0</span>
    `;
    btn.addEventListener('click', () => {
      toggleFilter(f.id);
    });
    filterListEl.appendChild(btn);
    filterBtnEls[f.id] = btn;
  }

  // Edit overlay — always on top
  editOvEl = document.createElement('div');
  editOvEl.id = 'ov-edit';
  stackEl.appendChild(editOvEl);
}

function rebuildCustomOverlays() {
  // Remove old custom overlay elements
  for (const el of Object.values(customOverlayEls)) el.remove();
  customOverlayEls = {};

  // Create new ones (inserted before the edit layer)
  for (const layer of (S.customLayers || [])) {
    const el = document.createElement('div');
    el.className = 'overlay';
    el.style.cssText = 'position:absolute;inset:0;width:100%;height:100%';
    stackEl.insertBefore(el, editOvEl);
    customOverlayEls[layer.id] = el;
  }
}

function overlayCustom(layer, floor, settled = false) {
  const c = layer.color;
  const items = (floor.items[layer.id] || []).filter(it => it.x !== null && it.x !== undefined);
  const iconSvg = CUSTOM_ICONS[layer.icon] || CUSTOM_ICONS.dot;

  const content = items.map((item, i) => `
    <g data-id="${item.id}" data-type="${layer.id}" class="ov-item${settled ? '' : ' rain-item'}" style="${settled ? '' : `animation-delay:${(i*0.05).toFixed(2)}s`}">
      <circle cx="${item.x}" cy="${item.y}" r="18" fill="transparent" pointer-events="all"/>
      <circle cx="${item.x}" cy="${item.y}" r="14"
        fill="rgba(0,0,0,.75)" stroke="${c}" stroke-width="1.5"/>
      <g transform="translate(${item.x-8},${item.y-8})" style="color:${c}" pointer-events="none">${iconSvg}</g>
      <text x="${item.x}" y="${item.y+26}" text-anchor="middle"
        fill="${c}" font-size="7" font-weight="700" font-family="'Segoe UI',sans-serif"
        filter="drop-shadow(0 1px 2px rgba(0,0,0,.9))" pointer-events="none">${item.name||''}</text>
    </g>
  `).join('');

  return shell(floor, c, layer.name.toUpperCase(), content);
}

function buildCustomLayerBtn(layer) {
  const btn = document.createElement('div');
  btn.className = 'filter-btn custom-layer-btn';
  btn.style.setProperty('--c', layer.color);
  btn.dataset.layerId = layer.id;
  btn.innerHTML = `
    <span class="ficon" style="color:${layer.color}">${CUSTOM_ICONS[layer.icon] || CUSTOM_ICONS.dot}</span>
    <span class="filter-btn-label">${layer.name}</span>
    <span class="fbadge" id="badge-${layer.id}">0</span>
    <button class="cl-edit-btn" title="Edit layer">✎</button>
    <button class="cl-del-btn" title="Delete layer">×</button>
  `;
  btn.addEventListener('click', (e) => {
    if (e.target.classList.contains('cl-edit-btn')) { openLayerModal(layer.id); return; }
    if (e.target.classList.contains('cl-del-btn')) { deleteCustomLayer(layer.id); return; }
    toggleFilter(layer.id);
  });
  return btn;
}

// ── Layer Modal ──

function openLayerModal(layerId = null) {
  lmState.editingId = layerId;

  if (layerId) {
    const layer = S.customLayers.find(l => l.id === layerId);
    if (!layer) return;
    lmState.selectedColor = layer.color;
    lmState.selectedIcon  = layer.icon;
    document.getElementById('layer-modal-title').textContent = 'EDIT LAYER';
    document.getElementById('lm-name').value    = layer.name;
    document.getElementById('lm-lstypes').value = layer.lsTypes.join(', ');
  } else {
    lmState.selectedColor = PRESET_COLORS[0];
    lmState.selectedIcon  = 'dot';
    document.getElementById('layer-modal-title').textContent = 'NEW LAYER';
    document.getElementById('lm-name').value    = '';
    document.getElementById('lm-lstypes').value = '';
  }

  document.getElementById('lm-err').textContent = '';

  // Render color swatches
  const colorGrid = document.getElementById('lm-colors');
  colorGrid.innerHTML = '';
  for (const color of PRESET_COLORS) {
    const sw = document.createElement('div');
    sw.className = 'lm-color-swatch' + (color === lmState.selectedColor ? ' selected' : '');
    sw.style.background = color;
    sw.dataset.color = color;
    sw.addEventListener('click', () => {
      lmState.selectedColor = color;
      colorGrid.querySelectorAll('.lm-color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === color));
    });
    colorGrid.appendChild(sw);
  }

  // Render icon buttons
  const iconGrid = document.getElementById('lm-icons');
  iconGrid.innerHTML = '';
  for (const [key, svg] of Object.entries(CUSTOM_ICONS)) {
    const ib = document.createElement('div');
    ib.className = 'lm-icon-btn' + (key === lmState.selectedIcon ? ' selected' : '');
    ib.dataset.icon = key;
    ib.innerHTML = svg;
    ib.addEventListener('click', () => {
      lmState.selectedIcon = key;
      iconGrid.querySelectorAll('.lm-icon-btn').forEach(b => b.classList.toggle('selected', b.dataset.icon === key));
    });
    iconGrid.appendChild(ib);
  }

  document.getElementById('layer-modal').classList.add('show');
  document.getElementById('lm-name').focus();
}

function closeLayerModal() {
  document.getElementById('layer-modal').classList.remove('show');
}

function saveCustomLayer() {
  const name = document.getElementById('lm-name').value.trim();
  if (!name) { document.getElementById('lm-err').textContent = 'Name is required.'; return; }
  const color   = lmState.selectedColor || PRESET_COLORS[0];
  const icon    = lmState.selectedIcon  || 'dot';
  const lsTypes = document.getElementById('lm-lstypes').value
    .split(',').map(s => s.trim().toLowerCase()).filter(Boolean);

  if (lmState.editingId) {
    // Edit existing
    const layer = S.customLayers.find(l => l.id === lmState.editingId);
    if (layer) { layer.name = name; layer.color = color; layer.icon = icon; layer.lsTypes = lsTypes; }
  } else {
    // New layer
    const layer = { id: generateId(), name, color, icon, lsTypes };
    S.customLayers.push(layer);
    // Initialize items on all floors
    for (const fl of S.floors) {
      if (!fl.items[layer.id]) fl.items[layer.id] = [];
    }
  }
  closeLayerModal();
  saveState();
  rebuildCustomOverlays();
  render();
}

function deleteCustomLayer(layerId) {
  if (!confirm('Delete this layer and all its items?')) return;
  S.customLayers = S.customLayers.filter(l => l.id !== layerId);
  for (const fl of S.floors) delete fl.items[layerId];
  // Remove from active filters
  const idx = S.filters.indexOf(layerId);
  if (idx >= 0) S.filters.splice(idx, 1);
  saveState();
  rebuildCustomOverlays();
  render();
}

function updateStatusLayers() {
  const layersEl = document.getElementById('status-layers');
  if (!layersEl) return;
  const count = S.filters.length;
  if (count > 0) {
    layersEl.textContent = `${count} Layer${count !== 1 ? 's' : ''} Active`;
    layersEl.classList.add('active');
  } else {
    layersEl.textContent = 'No Layers Active';
    layersEl.classList.remove('active');
  }
}

function render() {
  const floor = S.floors[S.currentFloor];

  // ── Floor tabs ──
  floorTabsEl.innerHTML = '';
  S.floors.forEach((fl, i) => {
    const tab = document.createElement('div');
    tab.className = 'floor-tab' + (i === S.currentFloor ? ' active' : '');

    const nameSpan = document.createElement('span');
    nameSpan.textContent = fl.name;
    nameSpan.style.cssText = 'pointer-events:none; user-select:none;';
    tab.appendChild(nameSpan);

    const delBtn = document.createElement('button');
    delBtn.className = 'floor-tab-del';
    delBtn.textContent = '×';
    delBtn.title = 'Delete floor';
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteFloor(i); });
    tab.appendChild(delBtn);

    tab.addEventListener('click', () => {
      if (S.currentFloor !== i) {
        S.currentFloor = i;
        S.placingType = null;
        saveState();
        render();
      }
    });
    tab.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const newName = prompt('Rename floor:', fl.name);
      if (newName && newName.trim()) {
        fl.name = newName.trim();
        saveState();
        render();
      }
    });
    floorTabsEl.appendChild(tab);
  });

  // ── Base map ──
  if (floor.image) {
    const W = 980, H = floor.coordH || 660;
    const t = floor.imageTransform || { x: 0, y: 0, scale: 1 };
    stackEl.style.height = H + 'px';
    baseEl.innerHTML = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <image href="${floor.image}"
        x="${t.x}" y="${t.y}"
        width="${W * t.scale}" height="${H * t.scale}"
        preserveAspectRatio="xMidYMid meet"
        opacity="${floor.imageOpacity}"/>
    </svg>`;
    imgSliderWrap.classList.add('show');
    imgSlider.value = floor.imageOpacity;
    // Sync transform sliders
    const scaleSlider = document.getElementById('img-scale');
    const panXSlider  = document.getElementById('img-pan-x');
    const panYSlider  = document.getElementById('img-pan-y');
    if (scaleSlider) scaleSlider.value = t.scale;
    if (panXSlider)  panXSlider.value  = t.x;
    if (panYSlider)  panYSlider.value  = t.y;
    document.getElementById('img-transform-wrap').classList.add('show');
  } else if (S.currentFloor === 0) {
    stackEl.style.height = (floor.coordH || 660) + 'px';
    baseEl.innerHTML = buildSampleMap(floor);
    imgSliderWrap.classList.remove('show');
    document.getElementById('img-transform-wrap').classList.remove('show');
  } else {
    stackEl.style.height = (floor.coordH || 660) + 'px';
    baseEl.innerHTML = buildEmptyFloor(floor);
    imgSliderWrap.classList.remove('show');
    document.getElementById('img-transform-wrap').classList.remove('show');
  }

  // ── Filter overlays ──
  const filterBadgeCounts = {
    desks:    floor.items.desks.length,
    pcs:      floor.items.desks.filter(d=>d.hasPC).length,
    phones:   floor.items.desks.filter(d=>d.hasPhone).length,
    printers: floor.items.printers.length,
    network:  floor.items.network.length,
    cameras:  floor.items.cameras.length,
  };

  for (const f of FILTERS) {
    const isActive = S.filters.includes(f.id);
    // If overlay was already visible, items are settled — don't re-animate
    const wasOn = overlayEls[f.id].classList.contains('on');
    const settled = wasOn && isActive;

    overlayEls[f.id].innerHTML = OVERLAY_BUILDERS[f.id](floor, settled);

    const badge = document.getElementById(`badge-${f.id}`);
    if (badge) badge.textContent = filterBadgeCounts[f.id];

    // Filters always respect toggle state — even in edit mode
    overlayEls[f.id].classList.toggle('on', isActive);
    filterBtnEls[f.id].classList.toggle('active', isActive);
  }

  // ── Custom layer overlays ──
  for (const layer of (S.customLayers || [])) {
    const el = customOverlayEls[layer.id];
    if (!el) continue;

    const isActive = S.filters.includes(layer.id);
    const wasOn = el.classList.contains('on');
    const settled = wasOn && isActive;

    el.innerHTML = overlayCustom(layer, floor, settled);
    el.classList.toggle('on', isActive);

    // Update badge
    const badge = document.getElementById(`badge-${layer.id}`);
    const count = (floor.items[layer.id] || []).length;
    if (badge) badge.textContent = count;
  }

  // ── Custom layer sidebar buttons ──
  const customLayerListEl = document.getElementById('custom-layer-list');
  if (customLayerListEl) {
    customLayerListEl.innerHTML = '';
    for (const layer of (S.customLayers || [])) {
      const btn = buildCustomLayerBtn(layer);
      btn.classList.toggle('active', S.filters.includes(layer.id));
      customLayerListEl.appendChild(btn);
    }
  }

  // ── Edit layer ──
  if (S.editMode) {
    editOvEl.innerHTML = buildEditLayer(floor);
    editOvEl.classList.add('active');
    if (S.placingType) {
      editOvEl.classList.add('placing');
    } else {
      editOvEl.classList.remove('placing');
    }
    bindEditLayer();
    editToolbar.classList.add('show');
    editModeBtn.classList.add('edit-active');
    tiltEl.style.transform = 'none';
  } else {
    editOvEl.innerHTML = '';
    editOvEl.classList.remove('active', 'placing');
    editToolbar.classList.remove('show');
    editModeBtn.classList.remove('edit-active');
    tiltEl.style.transform = 'rotateX(40deg)';
    hideAddForm();
  }

  // ── Edit toolbar tool buttons ──
  document.querySelectorAll('.et-btn[data-place]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.place === S.placingType);
  });

  // ── Status bar layer count ──
  updateStatusLayers();

  // ── Staging dock ──
  renderStagingDock();

  // ── Attach hover listeners directly to each item after DOM rebuild ──
  attachItemListeners();
}

// ═══════════════════════════════════════════════════════
// FILTER TOGGLE
// ═══════════════════════════════════════════════════════

function toggleFilter(id) {
  const idx = S.filters.indexOf(id);
  if (idx >= 0) {
    S.filters.splice(idx, 1);
  } else {
    S.filters.push(id);
  }
  saveState();
  render();
}

// ═══════════════════════════════════════════════════════
// EDIT MODE — DRAG & DROP
// ═══════════════════════════════════════════════════════

function bindEditLayer() {
  const svg = document.getElementById('edit-svg');
  if (!svg) return;

  let dragging = null;
  let dragType = null;
  let dragId = null;
  let startPt = null;
  let startItemPos = null;

  function getItemAndFloor(id, type) {
    const floor = S.floors[S.currentFloor];
    const arr = floor.items[type]; // works for both built-in keys and custom layer IDs
    return arr ? arr.find(x => x.id === id) : null;
  }

  svg.addEventListener('pointerdown', (e) => {
    // Click on empty space for placing
    if (S.placingType && !e.target.dataset.id) {
      const pt = svgPt(svg, e.clientX, e.clientY);
      showAddForm(pt.x, pt.y, e.clientX, e.clientY);
      return;
    }

    const el = e.target.closest('[data-id]');
    if (!el) return;

    e.preventDefault();
    dragging = el;
    dragId = el.dataset.id;
    dragType = el.dataset.type;
    startPt = svgPt(svg, e.clientX, e.clientY);

    const item = getItemAndFloor(dragId, dragType);
    if (!item) return;

    if (dragType === 'desks') {
      startItemPos = { x: item.x, y: item.y };
    } else {
      startItemPos = { x: item.x, y: item.y };
    }

    svg.setPointerCapture(e.pointerId);
  });

  svg.addEventListener('pointermove', (e) => {
    if (!dragging || !startPt) return;
    e.preventDefault();
    const pt = svgPt(svg, e.clientX, e.clientY);
    const dx = pt.x - startPt.x;
    const dy = pt.y - startPt.y;

    const item = getItemAndFloor(dragId, dragType);
    if (!item) return;

    const floor = S.floors[S.currentFloor];
    const maxH = floor.coordH || 660;
    item.x = Math.max(0, Math.min(980, startItemPos.x + dx));
    item.y = Math.max(0, Math.min(maxH, startItemPos.y + dy));

    // Move dragged element directly — do NOT rebuild innerHTML
    // (rebuilding destroys the SVG element that holds pointer capture)
    dragging.setAttribute('transform', `translate(${dx}, ${dy})`);

    // Rebuild overlays as settled (no rain re-animation) during drag
    if (overlayEls[dragType]) {
      overlayEls[dragType].innerHTML = OVERLAY_BUILDERS[dragType](floor, true);
    } else if (customOverlayEls[dragType]) {
      const layer = S.customLayers.find(l => l.id === dragType);
      if (layer) customOverlayEls[dragType].innerHTML = overlayCustom(layer, floor, true);
    }
    if (dragType === 'desks') {
      overlayEls['pcs'] && (overlayEls['pcs'].innerHTML = OVERLAY_BUILDERS['pcs'](floor, true));
      overlayEls['phones'] && (overlayEls['phones'].innerHTML = OVERLAY_BUILDERS['phones'](floor, true));
    }
  });

  svg.addEventListener('pointerup', (e) => {
    if (!dragging) return;
    const item = getItemAndFloor(dragId, dragType);
    if (item && item.lsId) {
      savePosition(item.lsId, item.x, item.y);
    }
    dragging = null;
    dragId = null;
    dragType = null;
    startPt = null;
    startItemPos = null;
    svg.releasePointerCapture(e.pointerId);
    saveState();
    render(); // full re-render cleans up the translate transform
  });

  svg.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const el = e.target.closest('[data-id]');
    if (!el) return;
    const id = el.dataset.id;
    const type = el.dataset.type;
    const floor = S.floors[S.currentFloor];
    const arr = floor.items[type];
    const item = arr.find(x => x.id === id);
    if (!item) return;
    const label = type === 'desks' ? item.name : (item.label || type);
    if (!confirm(`Delete ${type.slice(0,-1)}: ${label}?`)) return;
    floor.items[type] = arr.filter(x => x.id !== id);
    saveState();
    render();
  });
}

function commitAdd() {
  const type = S.placingType;
  const floor = S.floors[S.currentFloor];
  const newId = generateId();

  if (type === 'desks') {
    const name = document.getElementById('af-name').value.trim() || 'New Desk';
    floor.items.desks.push({
      id: newId,
      x: Math.round(_addSvgX - 41),
      y: Math.round(_addSvgY - 25),
      name,
      pc: document.getElementById('af-pc').value.trim(),
      ext: document.getElementById('af-ext').value.trim(),
      hasPC: document.getElementById('af-haspc').checked,
      hasPhone: document.getElementById('af-hasphone').checked,
    });
  } else if (type === 'printers') {
    floor.items.printers.push({
      id: newId,
      x: Math.round(_addSvgX),
      y: Math.round(_addSvgY),
      label: document.getElementById('af-pid').value.trim(),
      model: document.getElementById('af-pmodel').value.trim(),
    });
  } else if (type === 'network') {
    floor.items.network.push({
      id: newId,
      x: Math.round(_addSvgX),
      y: Math.round(_addSvgY),
      t: document.getElementById('af-ntype').value,
    });
  } else if (type === 'cameras') {
    floor.items.cameras.push({
      id: newId,
      x: Math.round(_addSvgX),
      y: Math.round(_addSvgY),
    });
  }

  hideAddForm();
  saveState();
  render();
}

function addFloor() {
  const name = prompt('New floor name:', `Floor ${S.floors.length + 1}`);
  if (!name) return;
  const newFloor = makeEmptyFloor(name.trim() || `Floor ${S.floors.length + 1}`);
  // Initialize custom layer item arrays on the new floor
  for (const layer of (S.customLayers || [])) {
    newFloor.items[layer.id] = [];
  }
  S.floors.push(newFloor);
  S.currentFloor = S.floors.length - 1;
  saveState();
  render();
}

function deleteFloor(i) {
  if (S.floors.length <= 1) { alert('Cannot delete the only floor.'); return; }
  if (!confirm(`Delete "${S.floors[i].name}"? This cannot be undone.`)) return;
  S.floors.splice(i, 1);
  if (S.currentFloor >= S.floors.length) S.currentFloor = S.floors.length - 1;
  saveState();
  render();
}
